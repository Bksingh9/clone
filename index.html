<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FeedbackOS</title><style>:root{--bg:#f6f7f4;--ink:#15201b;--muted:#647168;--line:#d9e1db;--surface:#fff;--soft:#eef4ef;--green:#1f8a5b;--rose:#bd3d52}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:#fbfcfa;padding:24px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.mark{display:grid;width:42px;height:42px;place-items:center;border-radius:8px;background:var(--ink);color:#fff;font-weight:800}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}h1,h2,h3{margin:0}h1{font-size:18px}h2{font-size:30px}nav{display:grid;gap:7px}nav button{border:0;border-radius:8px;background:transparent;color:var(--muted);padding:11px 12px;text-align:left;font-weight:700}nav button.active,nav button:hover{background:var(--soft);color:var(--ink)}main{padding:28px}.top,.row{display:flex;align-items:center;justify-content:space-between;gap:16px}.top{margin-bottom:16px}.toast,.panel,.metric,.hero{border:1px solid var(--line);border-radius:8px;background:var(--surface)}.toast{padding:11px 14px;color:#365143;margin-bottom:16px}.grid{display:grid;gap:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.metrics,.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.cards{grid-template-columns:repeat(3,1fr)}.panel,.metric,.hero{box-shadow:0 18px 50px rgb(21 32 27 / 10%)}.panel,.metric{padding:18px}.hero{padding:26px}.hero h3{max-width:760px;font-size:34px;line-height:1.12}.hero p,.panel p,li{color:var(--muted);line-height:1.65}.metric span{color:var(--muted);font-size:13px}.metric strong{display:block;margin-top:8px;font-size:30px}.btn{border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:10px 14px;font-weight:800}.btn.primary{border-color:var(--ink);background:var(--ink);color:white}.btn.danger{color:var(--rose)}label{display:grid;gap:7px;margin-top:12px;color:#304238;font-size:13px;font-weight:800}input,textarea{width:100%;border:1px solid #cbd6cf;border-radius:8px;background:white;color:var(--ink);padding:10px 11px}textarea{min-height:86px;resize:vertical}.event,.runtime{border:1px solid var(--line);border-radius:8px;background:#fbfcfa;padding:14px;margin-top:12px}.tag{display:inline-block;border-radius:999px;background:#ecf1ed;color:#40554a;padding:4px 8px;font-size:12px;font-weight:800;margin:2px}.ok{color:var(--green);font-weight:800}.empty{border:1px dashed #b9c6be;border-radius:8px;background:#fbfcfa;padding:24px;text-align:center;color:var(--muted)}pre{overflow:auto;border-radius:8px;background:#eef2ef;padding:14px;color:#27352e}@media(max-width:900px){.shell,.two,.metrics,.cards{grid-template-columns:1fr}aside{position:static;height:auto}nav{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="shell"><aside><div class="brand"><div class="mark">F</div><div><p class="eyebrow">FeedbackOS</p><h1>Live workspace</h1></div></div><nav id="nav"></nav><div class="panel" style="margin-top:24px"><p class="eyebrow">Usage</p><strong id="usage">0 responses</strong><p>No seeded data. This workspace starts empty.</p></div></aside><main><header class="top"><div><p class="eyebrow">Live user-facing app</p><h2 id="title">Command center</h2></div><button class="btn primary" onclick="setView('Builder')">Create survey</button></header><div class="toast" id="toast">Live workspace ready. Create a survey, collect a response, and view analytics.</div><section id="view"></section></main></div><script>const key='feedbackos-live-clean-v1',views=['Command','Builder','Collect','Responses','Insights','Integrations','Pricing','Launch'];let active='Command';let state=JSON.parse(localStorage.getItem(key)||'{"surveys":[],"responses":[]}');function save(){localStorage.setItem(key,JSON.stringify(state))}function toast(m){document.getElementById('toast').textContent=m}function setView(v){active=v;render()}function currentSurvey(){return state.surveys[state.surveys.length-1]||null}function nps(){if(!state.responses.length)return 0;const p=state.responses.filter(r=>r.score>=9).length,d=state.responses.filter(r=>r.score<=6).length;return Math.round(((p-d)/state.responses.length)*100)}function avg(){return state.responses.length?(state.responses.reduce((s,r)=>s+Number(r.score),0)/state.responses.length).toFixed(1):'0'}function createSurvey(){const name=document.getElementById('s-name').value.trim()||'Untitled survey',question=document.getElementById('s-question').value.trim()||'What feedback do you have?',audience=document.getElementById('s-audience').value.trim()||'All users';state.surveys.push({id:Date.now().toString(36),name,question,audience,status:'published'});save();toast('Survey created and published.');active='Collect';render()}function submitResponse(){const s=currentSurvey();if(!s){toast('Create a survey first.');active='Builder';render();return}const name=document.getElementById('r-name').value.trim()||'Anonymous',email=document.getElementById('r-email').value.trim()||'',score=Number(document.getElementById('r-score').value||0),text=document.getElementById('r-text').value.trim()||'';state.responses.unshift({id:Date.now().toString(36),surveyId:s.id,survey:s.name,name,email,score,text,tag:score<=6?'needs-follow-up':'captured',created:new Date().toISOString()});save();toast('Response captured from live input.');active='Responses';render()}function clearWorkspace(){state={surveys:[],responses:[]};save();toast('Workspace cleared. No data remains in this browser.');active='Command';render()}function renderNav(){document.getElementById('nav').innerHTML=views.map(v=>`<button class="${v===active?'active':''}" onclick="setView('${v}')">${v}</button>`).join('')}function command(){const s=currentSurvey();return `<div class="grid"><section class="hero"><p class="eyebrow">No dummy data</p><h3>FeedbackOS is live with an empty workspace.</h3><p>Create a real survey, submit real browser-session responses, and see the response inbox and analytics update from your inputs only.</p><button class="btn primary" onclick="setView('Builder')">Create first survey</button></section><section class="metrics"><div class="metric"><span>Surveys</span><strong>${state.surveys.length}</strong></div><div class="metric"><span>Responses</span><strong>${state.responses.length}</strong></div><div class="metric"><span>NPS</span><strong>${nps()}</strong></div><div class="metric"><span>Avg score</span><strong>${avg()}</strong></div></section><section class="two"><div class="panel"><h3>Current survey</h3>${s?`<p>${s.name}</p><p>${s.audience}</p><p class="ok">${s.status}</p>`:'<div class="empty">No survey created yet.</div>'}</div><div class="panel"><h3>Data policy</h3><ul><li>No sample responses are loaded.</li><li>No fake customers are shown.</li><li>Data comes only from this browser session.</li><li>Use server hosting for shared multi-user storage.</li></ul></div></section></div>`}function builder(){return `<div class="two"><div class="panel"><h3>Create survey</h3><label>Survey name<input id="s-name" placeholder="e.g. Onboarding feedback"></label><label>Audience<textarea id="s-audience" placeholder="e.g. Trial users after setup"></textarea></label><label>Question<textarea id="s-question" placeholder="What should we ask?"></textarea></label><button class="btn primary" onclick="createSurvey()">Publish survey</button></div><div class="panel"><h3>Runtime preview</h3><div class="runtime"><p class="eyebrow">Preview appears after publish</p><p>Create a survey to enable live response collection.</p></div></div></div>`}function collect(){const s=currentSurvey();if(!s)return `<div class="panel"><h3>Collect responses</h3><div class="empty">Create a survey first.</div><button class="btn primary" onclick="setView('Builder')">Create survey</button></div>`;return `<div class="two"><div class="panel"><h3>${s.name}</h3><p>${s.question}</p><label>Name<input id="r-name" placeholder="Your name"></label><label>Email<input id="r-email" placeholder="you@example.com"></label><label>Score<input id="r-score" type="number" min="0" max="10" value="8"></label><label>Answer<textarea id="r-text" placeholder="Type your feedback"></textarea></label><button class="btn primary" onclick="submitResponse()">Submit response</button></div><div class="panel"><h3>SDK contract</h3><pre>FeedbackOS.identify(userId, traits)\nFeedbackOS.track(eventName)\nFeedbackOS.showSurvey(surveyId)</pre><p>Production API credentials are intentionally not stored in this static page.</p></div></div>`}function responses(){if(!state.responses.length)return `<div class="panel"><h3>Response inbox</h3><div class="empty">No responses yet. Submit one from Collect.</div></div>`;return `<div class="panel"><div class="row"><h3>Response inbox</h3><button class="btn" onclick="exportCsv()">Export CSV</button></div>${state.responses.map(r=>`<div class="event"><div class="row"><strong>${r.name}</strong><span class="tag">${r.tag}</span></div><p>${r.email||'No email'} | ${r.survey} | score ${r.score}</p><p>${r.text||'No written answer'}</p></div>`).join('')}</div>`}function exportCsv(){const csv=['survey,name,email,score,tag,text'].concat(state.responses.map(r=>[r.survey,r.name,r.email,r.score,r.tag,r.text].map(v=>`"${String(v).replaceAll('"','""')}"`).join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='feedbackos-live-responses.csv';a.click();toast('CSV exported from live responses.')}function insights(){return `<div class="two"><div class="panel"><h3>Analytics</h3><p>Responses: ${state.responses.length}</p><p>NPS: ${nps()}</p><p>Average score: ${avg()}</p></div><div class="panel"><h3>Topic readiness</h3><p>AI clustering is not faked here. Connect a backend and AI provider to process real response text.</p></div></div>`}function integrations(){const items=['Twilio','Slack','HubSpot','Stripe','Webhooks','Email'];return `<div class="cards">${items.map(i=>`<div class="panel"><p class="eyebrow">not connected</p><h3>${i}</h3><p>No fake connection. Add server-side credentials to enable this integration.</p></div>`).join('')}</div>`}function pricing(){return `<div class="cards">${[['Free','$0'],['Launch','$29'],['Team','$89'],['Business','$249'],['Enterprise','Custom']].map(p=>`<div class="panel"><h3>${p[0]}</h3><strong style="font-size:32px">${p[1]}</strong><p>Pricing shown for product packaging. Billing is not faked in this static live page.</p></div>`).join('')}</div>`}function launch(){return `<div class="two"><div class="panel"><h3>Live status</h3><p class="ok">This page is public and user-facing.</p><p>No dummy records are seeded.</p><p>Survey and response flows work in-browser from real user input.</p></div><div class="panel"><h3>True shared production backend</h3><p>To share data across users, enable Sites or another server-capable host and connect database, auth, billing, and integration secrets.</p><button class="btn danger" onclick="clearWorkspace()">Clear browser workspace</button></div></div>`}function render(){renderNav();document.getElementById('title').textContent=active==='Command'?'Command center':active;document.getElementById('usage').textContent=`${state.responses.length} responses`;const map={Command:command,Builder:builder,Collect:collect,Responses:responses,Insights:insights,Integrations:integrations,Pricing:pricing,Launch:launch};document.getElementById('view').innerHTML=map[active]()}render();</script></body></html>
