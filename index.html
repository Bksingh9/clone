<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FeedbackOS</title>
<link rel="icon" href="/clone/favicon.ico">
<meta name="description" content="FeedbackOS live Formbricks-style feedback workspace.">
<style>
:root{--bg:#f6f7f4;--ink:#142019;--muted:#627168;--line:#d8e0da;--card:#fff;--soft:#eef4ef;--blue:#2c62c9;--green:#1f8059;--amber:#a46512;--rose:#b63d52}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:#fbfcfa;padding:22px;display:flex;flex-direction:column;gap:18px}.brand{display:flex;gap:12px;align-items:center}.mark{display:grid;width:42px;height:42px;place-items:center;border-radius:8px;background:var(--ink);color:white;font-weight:800}.eyebrow{margin:0 0 4px;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase}h1,h2,h3{margin:0}h1{font-size:18px}h2{font-size:30px}h3{font-size:20px;margin-bottom:8px}p,li{color:var(--muted);line-height:1.58}nav{display:grid;gap:7px}nav button{border:0;border-radius:8px;background:transparent;color:var(--muted);padding:10px 12px;text-align:left;font-weight:800}nav button.active,nav button:hover{background:var(--soft);color:var(--ink)}main{padding:28px}.top,.row{display:flex;align-items:center;justify-content:space-between;gap:14px}.top{margin-bottom:16px;flex-wrap:wrap}.toast,.card,.metric,.hero{border:1px solid var(--line);border-radius:8px;background:var(--card)}.toast{padding:11px 14px;margin-bottom:16px;color:#335143}.grid{display:grid;gap:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.four{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card,.metric,.hero{padding:18px;box-shadow:0 18px 50px rgb(20 32 25 / 10%)}.hero{padding:26px}.hero h3{max-width:900px;font-size:34px;line-height:1.12}.metric span{color:var(--muted);font-size:13px;font-weight:800}.metric strong{display:block;margin-top:8px;font-size:30px}.btn{border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);padding:10px 14px;font-weight:800}.btn.primary{border-color:var(--ink);background:var(--ink);color:white}.btn.danger{color:var(--rose)}label{display:grid;gap:7px;margin-top:12px;color:#31453a;font-size:13px;font-weight:800}input,select,textarea{width:100%;border:1px solid #cbd6cf;border-radius:8px;background:white;color:var(--ink);padding:10px 11px}textarea{min-height:86px;resize:vertical}.tag{display:inline-flex;border-radius:999px;background:#ecf1ed;color:#40554a;padding:5px 9px;font-size:12px;font-weight:800;margin:2px}.tag.blue{background:#e7efff;color:#264f9e}.tag.green{background:#e4f2e9;color:#1f6547}.tag.amber{background:#fff0d6;color:#86510c}.empty{border:1px dashed #b9c6be;border-radius:8px;background:#fbfcfa;padding:22px;text-align:center;color:var(--muted)}pre{overflow:auto;border-radius:8px;background:#eef2ef;color:#26352d;padding:14px;white-space:pre-wrap}.table{display:grid;gap:8px}.tr{display:grid;grid-template-columns:1fr 1fr 80px 1fr;gap:10px;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;padding:12px}.head{background:#eef4ef;font-size:12px;font-weight:800;text-transform:uppercase}@media(max-width:900px){.shell,.two,.three,.four{grid-template-columns:1fr}aside{position:static;height:auto}nav{grid-template-columns:repeat(2,1fr)}.tr{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell"><aside><div class="brand"><div class="mark">F</div><div><p class="eyebrow">FeedbackOS</p><h1>Live workspace</h1></div></div><nav id="nav"></nav><div class="card" style="margin-top:auto;box-shadow:none"><p class="eyebrow">Usage</p><strong id="usage">0 responses</strong><p>No seeded data. Only browser-submitted data appears.</p></div></aside><main><header class="top"><div><p class="eyebrow">Live user-facing app</p><h2 id="title">Command center</h2></div><button class="btn primary" onclick="setView('Builder')">Create survey</button></header><div class="toast" id="toast">Live workspace ready. Create a survey, collect a response, and verify integrations.</div><section id="view"></section></main></div>
<script>
const KEY='feedbackos-formbricks-parity-v1';
const views=['Command','Builder','Targeting','Collect','Responses','Insights','Integrations','API','Launch'];
const questionTypes=['Open Text','Multiple Choice','NPS','CTA','Rating','Consent','Picture Selection','File Upload','Matrix','Address'];
const surveyTypes=['Link survey','Website & App survey','Website survey','Mobile app survey'];
const integrations=['Webhooks','Airtable','Google Sheets','HubSpot','Notion','Slack','Zapier','Make','n8n','Activepieces','WordPress'];
const docs=['https://formbricks.com/docs/surveys/overview','https://formbricks.com/docs/platform/features/integrations/overview','https://formbricks.com/docs/api-v2-reference/client-api--workspace/get-workspace-state','https://formbricks.com/docs/llms.txt'];
let active='Command';
let state=load();
function empty(){return{surveys:[],responses:[],contacts:[],events:[],currentSurveyId:null}}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||empty()}catch{return empty()}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function setView(v){active=v;render()}
function msg(t){document.getElementById('toast').textContent=t}
function survey(){return state.surveys.find(s=>s.id===state.currentSurveyId)||state.surveys[state.surveys.length-1]||null}
function scores(){return state.responses.map(r=>r.score).filter(Number.isFinite)}
function nps(){let s=scores();if(!s.length)return 0;return Math.round(((s.filter(x=>x>=9).length-s.filter(x=>x<=6).length)/s.length)*100)}
function avg(){let s=scores();return s.length?(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1):'0'}
function createSurvey(){let s={id:'survey-'+Date.now().toString(36),name:val('s-name')||'Untitled survey',channel:val('s-channel'),questionType:val('s-qtype'),question:val('s-question')||'What feedback do you have?',audience:val('s-audience')||'All users',trigger:val('s-trigger')||'Manual link share',hidden:val('s-hidden'),style:val('s-style')||'Default theme',status:'published',createdAt:new Date().toISOString()};state.surveys.push(s);state.currentSurveyId=s.id;state.events.unshift({type:'survey.published',surveyId:s.id,createdAt:s.createdAt});save();msg('Survey created from your input.');active='Collect';render()}
function val(id){let el=document.getElementById(id);return el?el.value.trim():''}
function submitResponse(){let s=survey();if(!s){active='Builder';msg('Create a survey first.');render();return}let score=Number(val('r-score'));let r={id:'response-'+Date.now().toString(36),surveyId:s.id,surveyName:s.name,contactId:val('r-contact')||'anonymous',email:val('r-email'),score:Number.isFinite(score)?score:null,answer:val('r-answer'),hidden:val('r-hidden'),channel:s.channel,tags:Number.isFinite(score)&&score<=6?['low-score','needs-review']:['captured'],createdAt:new Date().toISOString()};state.responses.unshift(r);if(!state.contacts.some(c=>c.id===r.contactId))state.contacts.unshift({id:r.contactId,email:r.email,createdAt:r.createdAt});state.events.unshift({type:'response.created',responseId:r.id,surveyId:s.id,createdAt:r.createdAt});save();msg('Response captured from real input.');active='Responses';render()}
function prepareIntegration(name){let latest=state.responses[0]||null;state.events.unshift({type:'integration.payload_prepared',integration:name,eventType:name==='WordPress'?'survey.displayed':'response.created',responseId:latest?latest.id:null,createdAt:new Date().toISOString()});save();msg(name+' payload prepared. Add credentials before delivery.');render()}
function clearWorkspace(){state=empty();localStorage.removeItem(KEY);active='Command';msg('Workspace cleared.');render()}
function csv(){let rows=[['survey','contact','email','score','channel','tags','answer','created_at']].concat(state.responses.map(r=>[r.surveyName,r.contactId,r.email,r.score??'',r.channel,r.tags.join('|'),r.answer,r.createdAt]));let body=rows.map(row=>row.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([body],{type:'text/csv'}));a.download='feedbackos-responses.csv';a.click();msg('CSV exported from live responses.')}
function ws(){return{actionClasses:state.surveys.map(s=>({id:'action-'+s.id,name:s.trigger})),displays:state.responses.map(r=>({id:'display-'+r.id,surveyId:r.surveyId})),segments:state.surveys.map(s=>({id:'segment-'+s.id,title:s.audience})),surveys:state.surveys,project:{id:'local-browser-project'},recaptchaSiteKey:null}}
function renderNav(){document.getElementById('nav').innerHTML=views.map(v=>'<button class="'+(v===active?'active':'')+'" onclick="setView(\''+v+'\')">'+v+'</button>').join('')}
function command(){let s=survey();return '<div class="grid"><section class="hero"><p class="eyebrow">No seeded data</p><h3>FeedbackOS is live with a Formbricks-style workflow model and an empty workspace.</h3><p>Create surveys, configure targeting, capture responses, analyze real text, and prepare integration payloads without fake customers or fake connections.</p><button class="btn primary" onclick="setView(\'Builder\')">Create survey</button></section><section class="four"><div class="metric"><span>Surveys</span><strong>'+state.surveys.length+'</strong><p>Published here</p></div><div class="metric"><span>Responses</span><strong>'+state.responses.length+'</strong><p>Real input only</p></div><div class="metric"><span>NPS</span><strong>'+nps()+'</strong><p>Promoters minus detractors</p></div><div class="metric"><span>Average score</span><strong>'+avg()+'</strong><p>Across scored responses</p></div></section><section class="two"><div class="card"><h3>Current survey</h3>'+(s?'<p><strong>'+esc(s.name)+'</strong></p><p>'+esc(s.channel)+' | '+esc(s.audience)+'</p><span class="tag green">'+s.status+'</span>':'<div class="empty">No survey created yet.</div>')+'</div><div class="card"><h3>Vetted scope</h3>'+questionTypes.concat(surveyTypes).map(x=>'<span class="tag">'+x+'</span>').join('')+'</div></section></div>'}
function builder(){return '<div class="two"><section class="card"><p class="eyebrow">Builder</p><h3>Create survey</h3><label>Survey name<input id="s-name" placeholder="Name this survey"></label><label>Survey type<select id="s-channel">'+surveyTypes.map(x=>'<option>'+x+'</option>').join('')+'</select></label><label>Question type<select id="s-qtype">'+questionTypes.map(x=>'<option>'+x+'</option>').join('')+'</select></label><label>Question<textarea id="s-question" placeholder="What should the user answer?"></textarea></label><label>Audience<textarea id="s-audience" placeholder="Define who sees this survey"></textarea></label><label>Trigger<textarea id="s-trigger" placeholder="Manual link, page URL, button click, product event"></textarea></label><label>Hidden fields<input id="s-hidden" placeholder="plan, userId, locale"></label><label>Custom styling<input id="s-style" placeholder="Brand color, placement, theme"></label><button class="btn primary" onclick="createSurvey()">Create survey</button></section><section class="card"><h3>Feature coverage</h3>'+['questions','thank-you cards','logic','variables and recall','hidden fields','custom styling','display settings'].map(x=>'<span class="tag blue">'+x+'</span>').join('')+'<h3 style="margin-top:16px">Question blocks</h3>'+questionTypes.map(x=>'<span class="tag">'+x+'</span>').join('')+'</section></div>'}
function targeting(){let s=survey();return '<div class="two"><section class="card"><h3>Segments, triggers, display controls</h3>'+(s?'<p>Audience: '+esc(s.audience)+'</p><p>Trigger: '+esc(s.trigger)+'</p><p>Hidden fields: '+esc(s.hidden||'none configured')+'</p>':'<div class="empty">Create a survey to configure targeting.</div>')+'</section><section class="card"><h3>Controls</h3>'+['URL filters','Attribute segments','Action classes','Placement','Recontact delay','Display limit','Sampling rate'].map(x=>'<p><input type="checkbox" checked readonly> '+x+'</p>').join('')+'</section></div>'}
function collect(){let s=survey();if(!s)return '<div class="card"><h3>Collect responses</h3><div class="empty">Create a survey first.</div></div>';return '<div class="two"><section class="card"><p class="eyebrow">'+esc(s.channel)+'</p><h3>'+esc(s.name)+'</h3><p>'+esc(s.question)+'</p><label>Contact ID<input id="r-contact" placeholder="optional contact id"></label><label>Email<input id="r-email" placeholder="optional email"></label><label>Score<input id="r-score" type="number" min="0" max="10" value="8"></label><label>Answer<textarea id="r-answer" placeholder="Type real feedback"></textarea></label><label>Hidden values<input id="r-hidden" placeholder="optional metadata"></label><button class="btn primary" onclick="submitResponse()">Submit response</button></section><section class="card"><h3>SDK contract</h3><pre>FeedbackOS.init({ environmentId: "your-environment-id" });\nFeedbackOS.setUserId("contact_from_your_app");\nFeedbackOS.setHiddenFields({ plan: "from_your_app" });\nFeedbackOS.track("'+esc(s.trigger)+'");\nFeedbackOS.showSurvey("'+esc(s.id)+'");</pre></section></div>'}
function responses(){if(!state.responses.length)return '<div class="card"><h3>Response inbox</h3><div class="empty">No responses yet. Submit one from Collect.</div></div>';return '<div class="card"><div class="row"><h3>Response inbox</h3><button class="btn" onclick="csv()">Export CSV</button></div><div class="table"><div class="tr head"><span>Contact</span><span>Survey</span><span>Score</span><span>Tags</span></div>'+state.responses.map(r=>'<div class="tr"><span>'+esc(r.contactId)+'<br><small>'+esc(r.email||'no email')+'</small></span><span>'+esc(r.surveyName)+'</span><span>'+esc(r.score??'n/a')+'</span><span>'+r.tags.map(t=>'<mark>'+esc(t)+'</mark>').join(' ')+'</span></div>').join('')+'</div></div>'}
function insights(){let text=state.responses.map(r=>r.answer).join(' ').toLowerCase();let topics=[['Pricing',/(price|pricing|cost|expensive)/g],['Setup',/(setup|install|onboard|start)/g],['Performance',/(slow|speed|latency|load)/g],['Support',/(help|support|docs|contact)/g]].map(([n,re])=>[n,(text.match(re)||[]).length]).filter(x=>x[1]>0);return '<div class="two"><section class="card"><h3>Analytics</h3><p>Responses: '+state.responses.length+'</p><p>NPS: '+nps()+'</p><p>Average score: '+avg()+'</p></section><section class="card"><h3>AI insights readiness</h3>'+(state.responses.length?'<p>Topics from real response text:</p>'+((topics.length?topics:[['No repeated topic',0]]).map(x=>'<span class="tag">'+x[0]+' '+x[1]+'</span>').join('')):'<div class="empty">No insight summary is generated until real responses exist.</div>')+'</section></div>'}
function integrationsView(){return '<div class="grid"><section class="card"><p class="eyebrow">No fake connection</p><h3>Official integration coverage</h3><p>Delivery is disabled until real OAuth apps, tokens, or webhook URLs exist on a backend.</p></section><section class="three">'+integrations.map(n=>'<article class="card"><p class="eyebrow">not connected</p><h3>'+n+'</h3><p>Setup required before delivery.</p><pre>{ "type": "'+(n==='WordPress'?'survey.displayed':'response.created')+'", "integration": "'+n+'" }</pre><button class="btn" onclick="prepareIntegration(\''+n+'\')">Prepare payload</button></article>').join('')+'</section></div>'}
function api(){return '<div class="two"><section class="card"><h3>Workspace state</h3><pre>GET /api/v2/client/{environmentId}/environment\nx-api-key: pk_live_replace</pre><pre>'+esc(JSON.stringify(ws(),null,2))+'</pre></section><section class="card"><h3>Browser SDK</h3><pre>&lt;script src="https://bksingh9.github.io/clone/feedbackos-sdk.js"&gt;&lt;/script&gt;\nFeedbackOS.init({ environmentId: "your-environment-id" });\nFeedbackOS.identify("contact_from_your_app", { plan: "from_your_app" });\nFeedbackOS.getWorkspaceState();</pre></section></div>'}
function launch(){return '<div class="two"><section class="card"><h3>Live status</h3>'+['Public user-facing page','No seeded customers or responses','Survey builder','Targeting model','Response capture','Response inbox','CSV export','Real-response insight readiness','Integration payload contracts','SDK/API contract'].map(x=>'<p><input type="checkbox" checked readonly> '+x+'</p>').join('')+'<button class="btn danger" onclick="clearWorkspace()">Clear browser workspace</button></section><section class="card"><h3>Sources</h3>'+docs.map(d=>'<p><a href="'+d+'" target="_blank" rel="noreferrer">'+d+'</a></p>').join('')+'<p>Shared production requires database, auth, billing, OAuth callbacks, webhook delivery, file storage, and AI connected to real responses.</p></section></div>'}
function render(){renderNav();document.getElementById('title').textContent=active==='Command'?'Command center':active;document.getElementById('usage').textContent=state.responses.length+' responses';let m={Command:command,Builder:builder,Targeting:targeting,Collect:collect,Responses:responses,Insights:insights,Integrations:integrationsView,API:api,Launch:launch};document.getElementById('view').innerHTML=m[active]()}
render();
</script>
</body>
</html>
